version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: voxproof_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: voxproof
      POSTGRES_PASSWORD: password
      POSTGRES_DB: voxproof
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voxproof']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voxproof_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://voxproof:password@postgres:5432/voxproof
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voxproof_frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '5173:5173'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
